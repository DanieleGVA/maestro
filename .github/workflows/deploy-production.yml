# MAESTRO Deploy to Production
# Manual trigger with required approval.
# Builds Docker images, deploys to Hetzner production, runs health checks.
# Rolls back on failure.

name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (git short SHA from staging)"
        required: true
        type: string
      skip_build:
        description: "Skip build (use existing images from staging)"
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/maestro

jobs:
  deploy:
    name: "Deploy to Production"
    runs-on: ubuntu-24.04
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -- Optional rebuild --
      - name: Set up Docker Buildx
        if: ${{ inputs.skip_build == false }}
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        if: ${{ inputs.skip_build == false }}
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          file: infra/docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:${{ inputs.image_tag }}
            ${{ env.IMAGE_PREFIX }}-backend:production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard image
        if: ${{ inputs.skip_build == false }}
        uses: docker/build-push-action@v6
        with:
          context: src/dashboard
          file: infra/docker/Dockerfile.dashboard
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-dashboard:${{ inputs.image_tag }}
            ${{ env.IMAGE_PREFIX }}-dashboard:production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -- Tag existing images for production if skip_build --
      - name: Re-tag staging images for production
        if: ${{ inputs.skip_build == true }}
        run: |
          docker pull ${{ env.IMAGE_PREFIX }}-backend:${{ inputs.image_tag }}
          docker tag ${{ env.IMAGE_PREFIX }}-backend:${{ inputs.image_tag }} \
            ${{ env.IMAGE_PREFIX }}-backend:production
          docker push ${{ env.IMAGE_PREFIX }}-backend:production

          docker pull ${{ env.IMAGE_PREFIX }}-dashboard:${{ inputs.image_tag }}
          docker tag ${{ env.IMAGE_PREFIX }}-dashboard:${{ inputs.image_tag }} \
            ${{ env.IMAGE_PREFIX }}-dashboard:production
          docker push ${{ env.IMAGE_PREFIX }}-dashboard:production

      # -- Capture current state for rollback --
      - name: Capture rollback state
        id: rollback
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/maestro
            docker compose ps --format json > /opt/maestro/rollback-state.json 2>/dev/null || true
            docker compose config --images > /opt/maestro/rollback-images.txt 2>/dev/null || true
            echo "Rollback state captured"

      # -- Deploy --
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/maestro
            export IMAGE_TAG="${{ inputs.image_tag }}"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            echo "Deployed $IMAGE_TAG to production at $(date -u)"

      # -- Health check --
      - name: Post-deploy health check
        id: healthcheck
        run: |
          echo "Waiting for production to become healthy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${{ secrets.PRODUCTION_HOST }}/api/v1/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Production is healthy (attempt $i)"
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying..."
            sleep 10
          done
          echo "healthy=false" >> "$GITHUB_OUTPUT"
          echo "Production health check failed after 30 attempts"

      # -- Rollback on failure --
      - name: Rollback on failure
        if: ${{ steps.healthcheck.outputs.healthy == 'false' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/maestro
            echo "ROLLING BACK -- health check failed"
            # Revert to previous images
            if [ -f /opt/maestro/rollback-images.txt ]; then
              docker compose -f docker-compose.yml -f docker-compose.prod.yml down
              # Pull the previous images back
              while IFS= read -r img; do
                docker pull "$img" 2>/dev/null || true
              done < /opt/maestro/rollback-images.txt
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
              echo "Rollback completed at $(date -u)"
            else
              echo "No rollback state found, manual intervention required"
            fi

      - name: Fail if unhealthy
        if: ${{ steps.healthcheck.outputs.healthy == 'false' }}
        run: |
          echo "Production deployment failed health check. Rollback was attempted."
          exit 1
