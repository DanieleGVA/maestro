# MAESTRO Deploy to Staging
# Triggers after CI passes on main.
# Builds Docker images, pushes to container registry, deploys to Hetzner staging.

name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/maestro

jobs:
  deploy:
    name: "Build & Deploy to Staging"
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract git metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date -u +%Y%m%dT%H%M%SZ)" >> "$GITHUB_OUTPUT"

      # -- Backend image --
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          file: infra/docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:${{ steps.meta.outputs.sha_short }}
            ${{ env.IMAGE_PREFIX }}-backend:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}

      # -- Dashboard image --
      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: src/dashboard
          file: infra/docker/Dockerfile.dashboard
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-dashboard:${{ steps.meta.outputs.sha_short }}
            ${{ env.IMAGE_PREFIX }}-dashboard:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}

      # -- Deploy to Hetzner staging via SSH --
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/maestro
            export IMAGE_TAG="${{ steps.meta.outputs.sha_short }}"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            echo "Deployed commit $IMAGE_TAG to staging at $(date -u)"

      # -- Post-deploy health check --
      - name: Health check
        run: |
          echo "Waiting for staging to become healthy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${{ secrets.STAGING_HOST }}/api/v1/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Staging is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying..."
            sleep 10
          done
          echo "Staging health check failed after 30 attempts"
          exit 1
