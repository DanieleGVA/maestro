# MAESTRO Production Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Applies: resource limits, restart policies, production logging,
# monitoring sidecar, and security hardening.
# All containers run on Hetzner Cloud (DE/FI) -- EU data residency enforced.

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Production config
  # ---------------------------------------------------------------------------
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 16G
        reservations:
          cpus: "2.0"
          memory: 8G
    command: >
      postgres
        -c shared_buffers=4GB
        -c effective_cache_size=12GB
        -c work_mem=64MB
        -c maintenance_work_mem=512MB
        -c max_connections=200
        -c wal_level=replica
        -c archive_mode=on
        -c archive_command='test ! -f /archive/%f && cp %p /archive/%f'
        -c log_min_duration_statement=500
        -c log_checkpoints=on
        -c log_connections=on
        -c log_disconnections=on
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_archive:/archive
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Redis — Production config
  # ---------------------------------------------------------------------------
  redis:
    command: >
      redis-server
        --maxmemory 1gb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Keycloak — Production config
  # ---------------------------------------------------------------------------
  keycloak:
    environment:
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_ENABLED: "false"
      KC_PROXY_HEADERS: "xforwarded"
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    command: start --optimized
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Backend — Production config
  # ---------------------------------------------------------------------------
  backend:
    image: ${IMAGE_PREFIX:-ghcr.io/maestro}-backend:${IMAGE_TAG:-latest}
    build: !reset null
    environment:
      MAESTRO_DEBUG: "false"
      MAESTRO_LOG_LEVEL: "INFO"
      MAESTRO_DATABASE_URL: "postgresql+asyncpg://maestro_app:${POSTGRES_PASSWORD}@postgres:5432/maestro"
      MAESTRO_REDIS_URL: "redis://redis:6379/0"
      MAESTRO_KEYCLOAK_URL: "http://keycloak:8080"
      MAESTRO_CORS_ORIGINS: '["https://${DOMAIN}"]'
      MAESTRO_ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      MAESTRO_OPENAI_API_KEY: "${OPENAI_API_KEY}"
      MAESTRO_PII_ENCRYPTION_KEY: "${PII_ENCRYPTION_KEY}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "2.0"
          memory: 4G
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Dashboard — Production config
  # ---------------------------------------------------------------------------
  dashboard:
    image: ${IMAGE_PREFIX:-ghcr.io/maestro}-dashboard:${IMAGE_TAG:-latest}
    build: !reset null
    environment:
      NEXT_PUBLIC_API_URL: "https://${DOMAIN}"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: maestro-otel-collector
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ../../infra/monitoring/otel-collector-config.yml:/etc/otel/config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics (collector self)
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    container_name: maestro-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: "https://${DOMAIN}/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: always

  # ---------------------------------------------------------------------------
  # Loki (log aggregation)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.3.2
    container_name: maestro-loki
    command: -config.file=/etc/loki/config.yml
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
    restart: always

  # ---------------------------------------------------------------------------
  # Tempo (distributed tracing)
  # ---------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.6.1
    container_name: maestro-tempo
    command: ["-config.file=/etc/tempo/config.yml"]
    ports:
      - "3200:3200"   # Tempo API
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
    restart: always

  # ---------------------------------------------------------------------------
  # Mimir (metrics, Prometheus-compatible)
  # ---------------------------------------------------------------------------
  mimir:
    image: grafana/mimir:2.14.2
    container_name: maestro-mimir
    command: ["-config.file=/etc/mimir/config.yml", "-target=all"]
    ports:
      - "9009:9009"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
    restart: always

volumes:
  postgres_data:
  postgres_archive:
  redis_data:
  grafana_data:
  loki_data:
