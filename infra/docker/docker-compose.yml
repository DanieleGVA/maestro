# MAESTRO Local Development Stack
# Usage: docker compose -f infra/docker/docker-compose.yml up -d
#
# Provides: backend, dashboard, PostgreSQL (with AGE + pgvector), Redis, Keycloak
# All services run in EU-resident infrastructure in production (Hetzner DE/FI).

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 17 with pgvector + Apache AGE extensions
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17.2-bookworm
    container_name: maestro-postgres
    environment:
      POSTGRES_DB: maestro
      POSTGRES_USER: maestro_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maestro_app -d maestro"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis (caching + task queues)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4.1-bookworm
    container_name: maestro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Keycloak (self-hosted auth, SAML 2.0 + OIDC)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: maestro-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/maestro
      KC_DB_USERNAME: maestro_app
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_dev}
    ports:
      - "8080:8080"
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MAESTRO Backend (FastAPI + LangGraph)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../../src/backend
      dockerfile: ../../infra/docker/Dockerfile.backend
    container_name: maestro-backend
    environment:
      MAESTRO_DATABASE_URL: "postgresql+asyncpg://maestro_app:${POSTGRES_PASSWORD:-changeme_dev}@postgres:5432/maestro"
      MAESTRO_REDIS_URL: "redis://redis:6379/0"
      MAESTRO_KEYCLOAK_URL: "http://keycloak:8080"
      MAESTRO_KEYCLOAK_REALM: "maestro"
      MAESTRO_DEBUG: "true"
      MAESTRO_LOG_LEVEL: "DEBUG"
      MAESTRO_CORS_ORIGINS: '["http://localhost:3000"]'
      MAESTRO_ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      MAESTRO_OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MAESTRO Dashboard (Next.js)
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: ../../src/dashboard
      dockerfile: ../../infra/docker/Dockerfile.dashboard
    container_name: maestro-dashboard
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
